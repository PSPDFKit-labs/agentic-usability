name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build
        run: npm run build

      - name: Typecheck (server)
        run: npx tsc --noEmit

      - name: Typecheck (UI)
        run: npx tsc --noEmit --project ui/tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Test (server)
        run: npm test

      - name: Test (UI)
        run: npm test --prefix ui

      - name: Verify build artifacts
        run: |
          missing=0
          for f in dist/index.js dist-ui/index.html; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing build artifact: $f"
              missing=1
            fi
          done
          exit $missing

      - name: Dry-run pack
        run: npm pack --dry-run

      - name: Dry-run publish
        run: npm publish --dry-run